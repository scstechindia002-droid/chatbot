<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot-Mode</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="assets/css/style.css" />

    
  </head>
  <body>
    <main>
      <section class="page-padding">
        <div class="container">
          <div class="chatbot-btn-container">
            <h6>Ask Probot</h6>
            <div
              class="chatbot-show-btn"
              data-bs-label="chatbot-show-btn"
              id="chatbot-show-btn"
            >
              <img src="assets/images/Group 47286.svg" alt="message-icon" />
            </>
          </div>
          <div class="chatbot-container" id="chatbot-container">
            <div class="chatbot-container">
              <div class="chatbot-header">
                <div class="chatbot-header-content">
                  <img
                    src="assets/images/message-light-icon.png"
                    width="40"
                    height="40"
                    alt="message-icon"
                  />
                  <p>I am Probot, your digital assistant.</p>
                </div>
                <div class="chatbot-close-btn">
                  <img
                    src="assets/images/chatbot-close-icon.png"
                    alt="chatbot-close-btn-img"
                    width="20"
                    height="20"
                    id="chatbot-close-btn"
                  />
                </div>
              </div>
              <div class="chatbot-content" id="chatbot-content"></div>
              <div class="chatbot-input-container">
                <input
                  type="text"
                  class="form-control"
                  id="chatbot-message"
                  placeholder="type message..."
                  onchange="chatbotMessage()"
                />
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>

    <script src="assets/js/script.js"></script>
  </body>
</html>
